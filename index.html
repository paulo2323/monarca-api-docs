<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backend API Documentation</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-title">API Docs</h1>
        <p class="sidebar-subtitle">Backend documentation</p>
      </div>

      <div class="sidebar-base-endpoint">
        <span class="sidebar-label">Base endpoint</span>
        <code id="base-endpoint-sidebar"></code>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Menu generated by JS -->
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <p class="content-kicker">Documentation</p>
          <h2 class="content-title">Backend API Methods</h2>
          <p class="content-description">
            Select a method from the left menu to see its details.
          </p>
        </div>
      </header>

      <section class="method-detail card shadow-sm border-0" id="method-detail">
        <!-- Selected method rendered by JS -->
      </section>
    </main>
  </div>

  <script src="codigo.js"></script>
</body>
</html>
